# render.yaml - Blueprint for One-Click Deployment
# See https://render.com/docs/blueprints for details.

services:
  - type: web
    name: adtech-ecommerce
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn adtech.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: adtech-db
          property: connectionString
      - key: PAYPAL_MODE
        value: sandbox
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false

    disk:
      name: media-disk
      mountPath: /opt/render/project/src/media
      sizeGB: 1

databases:
  - name: adtech-db
    plan: free
